name: Build All Images

on:
  schedule:
    # Daily at 03:00 UTC -- 2h after the sync-upstream cron so any pulled-in
    # zuul.d/ changes are already on master before we build.
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      releases:
        description: "Release filter (comma-separated, empty = default 2026.1+master+rolling). Available: 2025.1,2025.2,2026.1,master,rolling"
        default: ""
      platforms:
        description: "Platform filter (comma-separated, empty = all). Available: linux/amd64,linux/arm64"
        default: ""
      services:
        description: "Service name substring filter (comma-separated, empty = all). E.g. 'keystone,neutron'"
        default: ""
      include_master:
        description: "Synthesize master variants from 2026.1 entries"
        type: boolean
        default: true
      dry_run:
        description: "Print the matrix and exit (no builds)"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # Force all JS actions (download-artifact, etc.) onto Node 24 instead of
  # the deprecated Node 20. GitHub will make this the default on 2026-06-02
  # and remove Node 20 entirely on 2026-09-16.
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  discover:
    runs-on: self-hosted
    #runs-on: ubuntu-latest
    outputs:
      foundation_matrix:       ${{ steps.gen.outputs.foundation_matrix }}
      foundation_merge_matrix: ${{ steps.gen.outputs.foundation_merge_matrix }}
      service_matrix:          ${{ steps.gen.outputs.service_matrix }}
      service_merge_matrix:    ${{ steps.gen.outputs.service_merge_matrix }}
      foundation_count:        ${{ steps.gen.outputs.foundation_count }}
      foundation_merge_count:  ${{ steps.gen.outputs.foundation_merge_count }}
      service_count:           ${{ steps.gen.outputs.service_count }}
      service_merge_count:     ${{ steps.gen.outputs.service_merge_count }}
      releases:                ${{ steps.gen.outputs.releases }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install --root-user-action=ignore pyyaml

      - id: gen
        name: Generate foundation + service matrices from zuul.d/ + build-local.d/
        run: |
          set -euo pipefail
          common_args=( --owner "${{ github.repository_owner }}" )

          # Cron-triggered runs default to master + rolling only. Stable
          # release branches (2026.1) rarely change in content -- rebuild
          # them on demand via workflow_dispatch when a backport merge or
          # CVE refresh needs it. workflow_dispatch with a non-empty
          # releases input takes precedence and can build any subset
          # (including the older 2025.1 / 2025.2 stable branches).
          # workflow_dispatch with an empty releases input defaults to
          # 2026.1 + master + rolling -- 2025.x are intentionally excluded
          # from the default since they're frozen and need explicit opt-in.
          if [ "${{ github.event_name }}" = "schedule" ]; then
            common_args+=( --releases "master,rolling" )
          elif [ -n "${{ inputs.releases }}" ]; then
            common_args+=( --releases "${{ inputs.releases }}" )
          else
            common_args+=( --releases "2026.1,master,rolling" )
          fi

          if [ -n "${{ inputs.platforms }}" ]; then
            common_args+=( --platforms "${{ inputs.platforms }}" )
          fi

          if [ -n "${{ inputs.services }}" ]; then
            common_args+=( --services "${{ inputs.services }}" )
          fi

          # include_master defaults to true (the input default). An explicit
          # workflow_dispatch with include_master=false is the only way to
          # turn off master synthesis.
          if [ "${{ inputs.include_master }}" != "false" ]; then
            common_args+=( --include-master )
          fi

          echo "Effective parser args: ${common_args[*]}"

          # Foundation tier (base, venv_builder) builds first. --split-platforms
          # expands each multi-arch row into one cell per arch so the matrix UI
          # shows whether amd64 or arm64 specifically failed; the merge tier
          # then stitches the per-arch tags into a manifest list at the
          # canonical (un-suffixed) tag.
          python .github/scripts/zuul_to_matrix.py "${common_args[@]}" \
            --tier foundation --split-platforms --format json > /tmp/foundation.json
          fcount=$(python -c "import json; print(len(json.load(open('/tmp/foundation.json'))))")
          echo "Foundation cells discovered: ${fcount}"
          python -c "import json; data=json.load(open('/tmp/foundation.json')); print('  -', '\n  - '.join(r['primary_tag'] for r in data)) if data else print('  (empty)')"
          python .github/scripts/zuul_to_matrix.py "${common_args[@]}" \
            --tier foundation --split-platforms --format github \
            | sed 's/^matrix=/foundation_matrix=/' >> "$GITHUB_OUTPUT"
          echo "foundation_count=${fcount}" >> "$GITHUB_OUTPUT"

          # Foundation merge tier: one cell per multi-arch foundation row that
          # combines :tag-amd64 + :tag-arm64 into :tag manifest list.
          python .github/scripts/zuul_to_matrix.py "${common_args[@]}" \
            --tier foundation_merge --format json > /tmp/foundation_merge.json
          fmcount=$(python -c "import json; print(len(json.load(open('/tmp/foundation_merge.json'))))")
          echo "Foundation merge cells discovered: ${fmcount}"
          python .github/scripts/zuul_to_matrix.py "${common_args[@]}" \
            --tier foundation_merge --format github \
            | sed 's/^matrix=/foundation_merge_matrix=/' >> "$GITHUB_OUTPUT"
          echo "foundation_merge_count=${fmcount}" >> "$GITHUB_OUTPUT"

          # Service tier (everything else) builds after foundation merge --
          # master service Dockerfiles FROM the canonical (merged) foundation
          # tag, so the manifest list must exist before service builds start.
          python .github/scripts/zuul_to_matrix.py "${common_args[@]}" \
            --tier service --split-platforms --format json > /tmp/service.json
          scount=$(python -c "import json; print(len(json.load(open('/tmp/service.json'))))")
          echo "Service cells discovered: ${scount}"
          python .github/scripts/zuul_to_matrix.py "${common_args[@]}" \
            --tier service --split-platforms --format github \
            | sed 's/^matrix=/service_matrix=/' >> "$GITHUB_OUTPUT"
          echo "service_count=${scount}" >> "$GITHUB_OUTPUT"

          # Service merge tier: combines per-arch service tags into manifest lists.
          python .github/scripts/zuul_to_matrix.py "${common_args[@]}" \
            --tier service_merge --format json > /tmp/service_merge.json
          smcount=$(python -c "import json; print(len(json.load(open('/tmp/service_merge.json'))))")
          echo "Service merge cells discovered: ${smcount}"
          python .github/scripts/zuul_to_matrix.py "${common_args[@]}" \
            --tier service_merge --format github \
            | sed 's/^matrix=/service_merge_matrix=/' >> "$GITHUB_OUTPUT"
          echo "service_merge_count=${smcount}" >> "$GITHUB_OUTPUT"

          # Distinct release codes that appear in the service matrix --
          # used by the next step to decide which pydep files to generate.
          releases=$(python -c "import json; \
            print(','.join(sorted({r['release'] for r in json.load(open('/tmp/service.json'))})))")
          echo "releases=${releases}" >> "$GITHUB_OUTPUT"

          {
            echo "## Build matrix"
            echo ""
            echo "- Foundation tier:       ${fcount} build + ${fmcount} merge entries"
            echo "- Service tier:          ${scount} build + ${smcount} merge entries"
            echo "- Releases:              ${releases}"
            echo ""
            python .github/scripts/format_matrix_summary.py /tmp/foundation.json --title Foundation
            python .github/scripts/format_matrix_summary.py /tmp/service.json --title Service
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate per-release pydep.txt
        run: |
          set -euo pipefail
          mkdir -p /tmp/pydep
          {
            echo ""
            echo "## Augmented pydep.txt"
            echo ""
            echo "Generated per-release driver lists (psycopg2-binary / confluent-kafka)"
            echo "by scanning each service's upstream requirements.txt."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          IFS=',' read -ra releases <<<"${{ steps.gen.outputs.releases }}"
          for rel in "${releases[@]}"; do
            case "${rel}" in
              master|rolling) ref="master" ;;
              *)              ref="stable/${rel}" ;;
            esac
            echo "::group::Generate pydep for ${rel} (ref=${ref})"
            python .github/scripts/generate_pydep.py \
              --release "${ref}" \
              --output "/tmp/pydep/pydep-${rel}.txt"
            echo "::endgroup::"
            {
              echo "<details><summary><code>pydep-${rel}.txt</code> (ref ${ref})</summary>"
              echo ""
              echo '```'
              tail -5 "/tmp/pydep/pydep-${rel}.txt"
              echo '```'
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Upload pydep artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pydep-files
          path: /tmp/pydep/
          retention-days: 7

  build-foundation:
    needs: discover
    if: ${{ !inputs.dry_run && needs.discover.outputs.foundation_count != '0' }}
    runs-on: self-hosted
    #runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix: ${{ fromJson(needs.discover.outputs.foundation_matrix) }}
    name: "foundation | ${{ matrix.job }} | ${{ matrix.release }} | ${{ matrix.arch }}"
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        if: matrix.arch != 'amd64'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: image=local/buildkit-harbor:latest

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          set -euo pipefail
          cd "${{ matrix.context }}"
          docker buildx build . \
            -f "${{ matrix.container_filename }}" \
            --platform "${{ matrix.platform }}" \
            ${{ matrix.tags_cli }} \
            ${{ matrix.build_args_cli }} \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --provenance=false \
            --push

  merge-foundation:
    needs: [discover, build-foundation]
    # Run merge as long as at least one per-arch build succeeded; if some
    # archs failed, imagetools create will fail at the missing-source step
    # and the merge cell turns red, surfacing the issue. Skipping the entire
    # merge tier when build-foundation has any failure would hide successful
    # per-arch artifacts that could still be useful for debugging.
    if: ${{ !cancelled() && !inputs.dry_run && needs.discover.outputs.foundation_merge_count != '0' && needs.build-foundation.result != 'skipped' }}
    runs-on: self-hosted
    timeout-minutes: 10
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix: ${{ fromJson(needs.discover.outputs.foundation_merge_matrix) }}
    name: "foundation-merge | ${{ matrix.job }} | ${{ matrix.release }}"
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list
        run: |
          set -euo pipefail
          # tag_bases and archs are space-separated lists from the matrix.
          # Tag/arch values come from trusted zuul.d YAML so unquoted
          # word-splitting in the for loops is safe here.
          for tag_base in ${{ matrix.tag_bases }}; do
            srcs=""
            for a in ${{ matrix.archs }}; do
              srcs="${srcs} ${tag_base}-${a}"
            done
            echo "::group::Merge ${tag_base}"
            echo "  sources:${srcs}"
            docker buildx imagetools create -t "${tag_base}" ${srcs}
            echo "::endgroup::"
          done

  build-services:
    needs: [discover, merge-foundation]
    # Wait for foundation merge so the canonical foundation tag exists --
    # master service Dockerfiles FROM ghcr.../base:master-ubuntu_noble
    # (not the per-arch -amd64/-arm64 form). 2025.x services FROM quay.io
    # upstream and don't actually need our self-built foundation; if their
    # specific foundation cell failed, that service cell will fail at
    # docker pull and the failure is self-evident in the run log.
    if: ${{ !cancelled() && !inputs.dry_run && needs.discover.outputs.service_count != '0' }}
    runs-on: self-hosted
    #runs-on: ubuntu-latest
    # 240 because horizon's libsass build under QEMU arm64 emulation
    # consistently hit 180 min (skyline used to too, but skyline now
    # cross-builds its JS bundle natively on $BUILDPLATFORM). horizon's
    # libsass is bundled inside the main `uv pip install /tmp/horizon`
    # step so we cannot easily split it out -- so we just give it more
    # wall clock. amd64 horizon finishes in ~15 min; arm64 needs ~3h15m.
    timeout-minutes: 240
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(needs.discover.outputs.service_matrix) }}
    name: "service | ${{ matrix.job }} | ${{ matrix.release }} | ${{ matrix.arch }}"
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        if: matrix.arch != 'amd64'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: image=local/buildkit-harbor:latest

      - name: Download per-release pydep.txt
        uses: actions/download-artifact@v4
        with:
          name: pydep-files
          path: /tmp/pydep/

      - name: Overlay generated pydep.txt for this release
        run: |
          set -euo pipefail
          src="/tmp/pydep/pydep-${{ matrix.release }}.txt"
          if [ ! -f "${src}" ]; then
            echo "ERROR: ${src} not found -- discover step did not generate it" >&2
            exit 1
          fi
          cp "${src}" pydep.txt
          echo "Overlayed pydep.txt with generator output for ${{ matrix.release }}:"
          tail -5 pydep.txt

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          set -euo pipefail
          cd "${{ matrix.context }}"
          docker buildx build . \
            -f "${{ matrix.container_filename }}" \
            --platform "${{ matrix.platform }}" \
            ${{ matrix.tags_cli }} \
            ${{ matrix.build_args_cli }} \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --provenance=false \
            --push

  merge-services:
    needs: [discover, build-services]
    if: ${{ !cancelled() && !inputs.dry_run && needs.discover.outputs.service_merge_count != '0' && needs.build-services.result != 'skipped' }}
    runs-on: self-hosted
    timeout-minutes: 10
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(needs.discover.outputs.service_merge_matrix) }}
    name: "service-merge | ${{ matrix.job }} | ${{ matrix.release }}"
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list
        run: |
          set -euo pipefail
          for tag_base in ${{ matrix.tag_bases }}; do
            srcs=""
            for a in ${{ matrix.archs }}; do
              srcs="${srcs} ${tag_base}-${a}"
            done
            echo "::group::Merge ${tag_base}"
            echo "  sources:${srcs}"
            docker buildx imagetools create -t "${tag_base}" ${srcs}
            echo "::endgroup::"
          done

  summary:
    needs: [discover, build-foundation, merge-foundation, build-services, merge-services]
    if: ${{ !cancelled() && !inputs.dry_run }}
    runs-on: self-hosted
    #runs-on: ubuntu-latest
    steps:
      - name: Aggregate result
        run: |
          {
            echo "## Build summary"
            echo ""
            echo "- Foundation build entries: ${{ needs.discover.outputs.foundation_count }} (result: ${{ needs.build-foundation.result }})"
            echo "- Foundation merge entries: ${{ needs.discover.outputs.foundation_merge_count }} (result: ${{ needs.merge-foundation.result }})"
            echo "- Service build entries:    ${{ needs.discover.outputs.service_count }} (result: ${{ needs.build-services.result }})"
            echo "- Service merge entries:    ${{ needs.discover.outputs.service_merge_count }} (result: ${{ needs.merge-services.result }})"
          } >> "$GITHUB_STEP_SUMMARY"
