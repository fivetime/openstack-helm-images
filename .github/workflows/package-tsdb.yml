name: Package TimescaleDB for Percona PGO

on:
  workflow_dispatch:
    inputs:
      pg_major:
        description: 'PostgreSQL 大版本'
        required: true
        default: '18'
        type: choice
        options: ['15', '16', '17', '18']
      tsdb_version:
        description: 'TimescaleDB 版本'
        required: true
        default: '2.26.3'
      edition:
        description: '版本'
        required: true
        default: 'oss'
        type: choice
        options: ['oss', 'tsl']

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  NAMESPACE: openstackhelm
  R2_BUCKET: tsdb-percona

jobs:
  package-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and push packager image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.NAMESPACE }}/tsdb-packager:pg${{ inputs.pg_major }}-${{ inputs.tsdb_version }}-${{ inputs.edition }}"
          echo "Target: ${IMAGE}"

          docker build \
            --build-arg PG_MAJOR=${{ inputs.pg_major }} \
            --build-arg TSDB_VERSION=${{ inputs.tsdb_version }} \
            --build-arg EDITION=${{ inputs.edition }} \
            -t "${IMAGE}" \
            -f percona-timescaledb/Dockerfile.tsdb-packager \
            percona-timescaledb

          docker push "${IMAGE}"
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Extract tar.gz from image
        run: |
          artifact="timescaledb-pg${{ inputs.pg_major }}-${{ inputs.tsdb_version }}.tar.gz"
          cid=$(docker create "${IMAGE}" /x)
          docker cp "$cid:/${artifact}" "./${artifact}"
          docker rm "$cid"
          ls -lh "${artifact}"
          sha256sum "${artifact}"

      - name: Upload tar.gz as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: timescaledb-pg${{ inputs.pg_major }}-${{ inputs.tsdb_version }}-${{ inputs.edition }}
          path: timescaledb-pg${{ inputs.pg_major }}-${{ inputs.tsdb_version }}.tar.gz
          retention-days: 30

      - name: Upload tar.gz to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
          AWS_DEFAULT_REGION: auto
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
        run: |
          artifact="timescaledb-pg${{ inputs.pg_major }}-${{ inputs.tsdb_version }}.tar.gz"
          aws s3 cp "${artifact}" "s3://${R2_BUCKET}/${artifact}" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}"
          aws s3 ls "s3://${R2_BUCKET}/" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}"
