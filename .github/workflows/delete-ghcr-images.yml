name: Delete GHCR images

# MANUAL ONLY, destructive. Wipes the ghcr.io/<owner>/<namespace_prefix>*
# container images so the next daily build republishes everything fresh --
# this stops stale tags from lingering and masking problems. There is
# deliberately NO schedule trigger: this must always be invoked by hand.
#
# (GHCR stores container images as "packages" of type=container in the API, so
# under the hood the script talks to the GitHub packages API.)
#
# Safety rails:
#   * dry_run defaults to true -> first run only LISTS what would be deleted.
#   * to actually delete you must set dry_run=false AND type DELETE in confirm.
#   * only images whose name starts with namespace_prefix are ever touched.
#
# The token comes from the CR_PAT repo secret (must carry read:packages +
# delete:packages, and repo for private images). Never hard-code a token.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "List only, no deletion. Uncheck to actually delete."
        type: boolean
        default: true
      confirm:
        description: "Type DELETE to confirm real deletion (required when dry_run is off)."
        type: string
        default: ""
      namespace_prefix:
        description: "Only images whose name starts with this are deleted."
        type: string
        default: "openstackhelm/"
      exclude:
        description: "Images under the prefix to PROTECT (not republished by the daily build)."
        type: string
        default: "openstackhelm/tsdb-packager"

# Never let two deletion runs race.
concurrency:
  group: delete-ghcr-images
  cancel-in-progress: false

permissions:
  contents: read   # just for actions/checkout; image deletion uses CR_PAT

jobs:
  delete:
    runs-on: self-hosted
    #runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      # Self-hosted runners don't all have `python` on PATH (only python3, if
      # any); setup-python guarantees it, matching build-all-images.yml.
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Delete matching GHCR images
        env:
          GH_TOKEN: ${{ secrets.CR_PAT }}
          OWNER: fivetime
          PACKAGE_TYPE: container
          NAMESPACE_PREFIX: ${{ inputs.namespace_prefix }}
          EXCLUDE: ${{ inputs.exclude }}
          DRY_RUN: ${{ inputs.dry_run }}
          CONFIRM: ${{ inputs.confirm }}
        run: python .github/scripts/delete_ghcr_images.py
