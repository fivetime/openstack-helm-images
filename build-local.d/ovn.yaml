---
# Fork-only ovn variants. Upstream zuul.d/ovn.yaml already builds the
# Dockerfile.ubuntu variants tagged ubuntu_jammy / ubuntu_noble. The entries
# below add the Alpine and CentOS Stream 9 variants, which upstream does
# not provide.
#
# Alpine (source build) is decoupled from ovn-kubernetes: its runtime scripts
# (ovnkube.sh / ovndb-raft-functions.sh) are VENDORED in ovn/scripts/ (see
# ovn/scripts/README.md), so it no longer clones ovn-kubernetes and OVN can be
# built from main (latest -- includes Transit Router / OVN-IC >= 26.03).
#
# CentOS still clones ovn-kubernetes at a pinned OVN_KUBERNETES_REF (it also
# builds the Go ovn-kube-util from it) and uses distro RPMs for OVN; the
# patches in patches/ovn-kubernetes/ are written against that exact 2024-01
# commit, so bumping the REF without rebasing the patches breaks that build.

- job:
    name: build-local-ovn-alpine
    description: Build fork-only ovn Alpine variant (OVN from source, main).
    vars:
      container_images:
        - context: ovn
          repository: openstackhelm/ovn
          container_filename: Dockerfile.alpine
          arch:
            - linux/amd64
            - linux/arm64
          tags:
            - alpine_latest
          # OVN built from main = the latest code each daily build (Transit
          # Router / OVN-IC >= 26.03). The ovn-kubernetes scripts are vendored
          # (ovn/scripts/), so OVN_KUBERNETES_REF is not used here. For a
          # reproducible/stable image, pin OVN_BRANCH to a release tag
          # (e.g. branch-26.03) instead of the moving main branch.
          build_args:
            - OVN_BRANCH=main

- job:
    name: build-local-ovn-centos
    description: Build fork-only ovn CentOS Stream 9 variant.
    vars:
      container_images:
        - context: ovn
          repository: openstackhelm/ovn
          container_filename: Dockerfile.centos
          arch:
            - linux/amd64
            - linux/arm64
          tags:
            - centos_stream9
          # Override the Dockerfile defaults (OVN_SERIES=24.03 / OVS_SERIES=3.2)
          # to the matching 25.09 RPMs from the CentOS NFV SIG repo. To bump
          # in the future, query: `dnf list available ovn25.XX-host` and
          # `dnf list available openvswitch3.X` against centos-nfv-openvswitch.
          # OVN_KUBERNETES_REF is pinned to the 2024-01 commit the patches
          # target (see header); CentOS still clones ovn-kubernetes.
          build_args:
            - FROM=quay.io/centos/centos:stream9
            - OVS_SERIES=3.5
            - OVS_VERSION=3.5.3-6
            - OVN_SERIES=25.09
            - OVN_VERSION=25.09.2-115
            - OVN_KUBERNETES_REF=5359e7d7f872058b6e5bf884c9f19d1922451f29
