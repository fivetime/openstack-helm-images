---
# Fork-only neutron Alpine variant. Upstream zuul.d/neutron.yaml builds only the
# Dockerfile (venv/loci) ubuntu_noble variants. This entry adds an Alpine variant
# that is SAME-SOURCE as the ubuntu one (opendev neutron stable/2026.1) and
# differs by exactly one thing: it ships ovsdb_dns_patch -- a synchronous
# getaddrinfo replacement for ovs.dns_resolve.resolve.
#
# Why: the stock python `ovs` library only resolves DNS via the (async) unbound
# library, so a one-shot OVSDB connect to a hostname fails and ovn_nb_connection
# has to be a bare IP (a single LB/ClusterIP VIP). A single VIP hides the RAFT
# members, so a leader_only client lands on a follower and flaps
# ("not cluster leader; trying another server"). With the patch, neutron-server
# and neutron-ovn-agent can use the full per-pod RAFT member list (DNS names) ->
# follow the leader, no flap, and survive pod migration (re-resolve the FQDN).
#
# It is layered ON TOP of the fork's ovn Alpine image (OVN_IMAGE defaults to
# ghcr.io/.../ovn:alpine_latest) so it inherits ovs-vsctl / ovsdb tooling that
# neutron-ovn-agent needs. Same one-build-lag ordering caveat as neutron-ovnic:
# OVN_IMAGE resolves to the PREVIOUSLY published ovn:alpine_latest. To pin, set
# OVN_IMAGE to a digest below.

- job:
    name: build-local-neutron-alpine
    description: Build fork-only neutron Alpine variant (adds synchronous OVSDB DNS patch).
    vars:
      container_images:
        # Tagged as a 2026.1 *release* entry (not a rolling `alpine_latest`) so it
        # mirrors the ubuntu image pair exactly:
        #   * 2026.1-alpine_3.23  -- this entry, source stable/2026.1, DETERMINISTIC,
        #     built only on dispatch/release (the daily cron's master,rolling set
        #     excludes 2026.1 -- no point rebuilding pinned code every day).
        #   * master-alpine_3.23  -- auto-synthesized by --include-master from this
        #     2026.1 entry (tag 2026.1->master, NEUTRON_REF stable/2026.1->master),
        #     source neutron master, built DAILY by cron. This is the moving
        #     "latest". (synthesize_master's BASE_VENV_BUILDER rewrites are no-ops
        #     here -- the alpine image is FROM ovn:alpine_latest, not the loci venv.)
        - context: neutron
          repository: openstackhelm/neutron
          container_filename: Dockerfile.alpine
          arch:
            - linux/amd64
            - linux/arm64
          tags:
            - 2026.1-alpine_3.23
          # Same source as the upstream ubuntu image (opendev stable/2026.1); the
          # only delta is the DNS patch + db/kafka drivers. For a reproducible
          # image, pin NEUTRON_REF to a tag/sha and OVN_IMAGE to a digest.
          build_args:
            - NEUTRON_REF=stable/2026.1
